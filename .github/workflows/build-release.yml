name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: MinecraftProxy-Windows.zip
          - os: macos-latest
            artifact: MinecraftProxy-macOS.tar.gz
    
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pyinstaller pyyaml PyQt5

      - name: Build
        run: pyinstaller --onedir --noconfirm --name MinecraftProxy launcher.py

      - name: Package for Windows
        if: matrix.os == 'windows-latest'
        run: cd dist && powershell -Command "Compress-Archive -Path MinecraftProxy -DestinationPath ${{ matrix.artifact }} -Force"

      - name: Package for macOS
        if: matrix.os == 'macos-latest'
        run: cd dist && tar -czvf ../${{ matrix.artifact }} MinecraftProxy

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display structure
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/MinecraftProxy-Windows.zip
            artifacts/MinecraftProxy-macOS.tar.gz
